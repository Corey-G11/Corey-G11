version: '3.9'
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: fitos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fitos
      POSTGRES_PASSWORD: fitos_dev
      POSTGRES_DB: fitos_dev
    ports:
      - '5432:5432'
    volumes:
      - fitos_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fitos -d fitos_dev']
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: fitos_redis
    ports:
      - '6379:6379'
volumes:
  fitos_pgdata:
